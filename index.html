<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽象智商测试</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>抽象鉴定器 v1.0</h1>
        <progress id="progress-bar" value="0" max="20" style="width: 100%; height: 20px;"></progress>
        <p id="progress-text">进度: 0 / 20</p>
        
        <div id="question-container">
            <button id="start-btn" onclick="startTest()">开始测试 (后果自负)</button>
        </div>

        <div id="leaderboard" style="display: none;">
            <h2>抽象排行榜</h2>
            <ul id="rank-list"></ul>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
