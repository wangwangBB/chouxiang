<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全宇宙抽象等级评估系统 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'ZCOOL KuaiLe', 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 0, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 255, 255, 0.05), transparent 25%);
        }

        .glitch-text {
            text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan);
            animation: glitch 2s infinite alternate-reverse;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); }
            20% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); }
            40% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); }
            60% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); transform: translate(1px, 1px); }
            80% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); transform: translate(-1px, -1px); }
            100% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .btn-abstract {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
            border: none;
            color: white;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .btn-abstract:hover {
            transform: scale(1.05) rotate(-1deg);
            box-shadow: 0 0 15px var(--neon-pink), 0 0 15px var(--neon-cyan);
        }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .option-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: var(--neon-cyan);
            transform: translateX(5px);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: #000;
            border: 2px solid var(--neon-pink);
            border-radius: 0.5rem;
            overflow: hidden;
            touch-action: none;
        }

        input[type=range].chaos-slider {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range].chaos-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 30px;
            width: 30px;
            border-radius: 50%;
            background: var(--neon-pink);
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 10px var(--neon-pink);
        }
        input[type=range].chaos-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 10px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl glass-panel p-6 sm:p-8 relative">
        <div class="text-center py-10">
            <i class="fas fa-spinner fa-spin text-4xl text-pink-500"></i>
            <p class="mt-4 text-cyan-400">正在连接宇宙意识网络...</p>
        </div>
    </div>

    <script type="module">
        let state = {
            currentStep: -1,
            score: 0,
            userName: "",
            userId: "user_" + Math.random().toString(36).substr(2, 9),
            usingLocal: false
        };

        const testData = [
            // === 题型1：梗系解码题 ===
            { type: 'q', q: '请问以下哪个选项最能准确描述“电子木鱼”的核心功能？', options: [{t:'宗教修行工具',s:0}, {t:'音乐播放器',s:0}, {t:'解压软件',s:5}, {t:'电子功德充值器',s:15}] },
            { type: 'q', q: '当有人说“我是一个保安，爱吃小熊饼干”，他最想表达的是？', options: [{t:'他的职业和爱好',s:0}, {t:'他很可爱',s:0}, {t:'他在摸鱼',s:10}, {t:'他想下班',s:15}] },
            { type: 'q', q: '请问“九转大肠”的灵魂是什么？', options: [{t:'大肠的口感',s:0}, {t:'厨师的演技',s:5}, {t:'评委的表情',s:10}, {t:'保留的原味',s:15}] },
            { type: 'q', q: '以下哪个是“抽象圣经”？', options: [{t:'《论语》',s:0}, {t:'《圣经》',s:0}, {t:'《旭旭宝宝经典语录》',s:10}, {t:'《电棍otto语录》',s:15}] },
            { type: 'q', q: '“恐龙抗狼”的终极物理学含义是？', options: [{t:'云南非物质文化遗产',s:0}, {t:'一种强力的镇定剂',s:5}, {t:'不知道',s:0}, {t:'描述宇宙大爆炸时产生的引力波音效',s:15}] },
            { type: 'q', q: '加入“麦门”后，你的灵魂会变成什么形状？', options: [{t:'汉堡包',s:2}, {t:'M字形',s:5}, {t:'完美的圆形',s:0}, {t:'一根金黄酥脆永远不会软塌的薯条',s:15}] },
            { type: 'q', q: '“哈基米”原本在二次元语境里是指什么？', options: [{t:'可爱的小猫咪',s:0}, {t:'所有毛茸茸的动物',s:0}, {t:'一种神秘魔法阵',s:5}, {t:'赛马娘里喝的蜂蜜水',s:15}] },
            
            // 小游戏 1
            { type: 'game', id: 'stare_abyss', title: '小游戏：凝视深渊', desc: '把鼠标指针停在深渊中心（手机端则按住不放），保持绝对静止3秒钟。任何颤抖都会导致重新计时。' },
            
            // === 题型2：离谱联想题 ===
            { type: 'q', q: '请用一句话建立“香蕉”和“奥特曼”的联系：', options: [{t:'没联系',s:0}, {t:'香蕉是黄色的，奥特曼眼睛也是黄色的',s:5}, {t:'奥特曼打怪兽时把香蕉当武器',s:10}, {t:'香蕉的皮是奥特曼的变身器',s:15}] },
            { type: 'q', q: '请用一句话建立“数学老师”和“挖掘机”的联系：', options: [{t:'没关系',s:0}, {t:'都在使用工具',s:5}, {t:'都在挖掘深层逻辑',s:10}, {t:'数学老师的课能把我的脑干挖空',s:15}] },
            { type: 'q', q: '请用一句话建立“保温杯”和“摇滚乐”的联系：', options: [{t:'没联系',s:0}, {t:'主唱喝水用',s:5}, {t:'保温杯里泡枸杞是中年摇滚',s:10}, {t:'用保温杯砸架子鼓才是真摇滚',s:15}] },
            { type: 'q', q: '请用一句话建立“鲁迅”和“键盘”的联系：', options: [{t:'没联系',s:0}, {t:'鲁迅其实用打字机',s:5}, {t:'鲁迅的笔就是他的键盘',s:10}, {t:'网上冲浪的网友人均都是鲁迅',s:15}] },
            
            // 小游戏 2
            { type: 'game', id: 'wooden_fish', title: '小游戏：赛博木鱼', desc: '虔诚地敲击木鱼。精确敲击49下后点击“功德圆满”。多敲一下则前功尽弃！' },

            // === 题型3：反常识选择题 ===
            { type: 'q', q: '为什么小明走路脚不沾地？', options: [{t:'地球是圆的',s:0}, {t:'他没有脚',s:0}, {t:'他会飞',s:5}, {t:'他穿了鞋子',s:15}] },
            { type: 'q', q: '什么动物最容易被贴在墙上？', options: [{t:'壁虎',s:0}, {t:'蜗牛',s:0}, {t:'蜘蛛',s:5}, {t:'海豹 (海报)',s:15}] },
            { type: 'q', q: '什么水永远用不完？', options: [{t:'海水',s:0}, {t:'雨水',s:0}, {t:'口水',s:5}, {t:'打工人的泪水',s:15}] },
            { type: 'q', q: '哪种瓜不能吃？', options: [{t:'西瓜',s:0}, {t:'南瓜',s:0}, {t:'傻瓜',s:5}, {t:'顶呱呱',s:15}] },
            { type: 'q', q: '为什么陨石总是能精准地砸在陨石坑里？', options: [{t:'万有引力',s:0}, {t:'巧合',s:5}, {t:'因为坑是陨石砸出来的',s:10}, {t:'因为那是陨石的专属VIP停车位',s:15}] },
            
            // 小游戏 3
            { type: 'game', id: 'abstract_typing', title: '小游戏：外星电报', desc: '在输入框里随便打字，只要打出5个字符即可通关，但你看到的可能不是你打的。' },

            // === 题型4：抽象描述题 ===
            { type: 'q', q: '请用抽象的方式描述“手机”：', options: [{t:'通讯工具',s:0}, {t:'发光板',s:5}, {t:'现代人的外置器官',s:10}, {t:'装下世界的小盒子',s:15}] },
            { type: 'q', q: '请用抽象的方式描述“闹钟”：', options: [{t:'叫醒工具',s:0}, {t:'噪音制造机',s:5}, {t:'美梦终结者',s:10}, {t:'资本家安插在我床头的监工',s:15}] },
            { type: 'q', q: '请用抽象的方式描述“雨伞”：', options: [{t:'挡雨的',s:0}, {t:'长柄香菇',s:5}, {t:'随身携带的便携式天空',s:10}, {t:'用来测试今天会不会下雨的玄学道具(带了就不下)',s:15}] },
            { type: 'q', q: '请用抽象的方式描述“头发”：', options: [{t:'头上的毛',s:0}, {t:'烦恼丝',s:5}, {t:'无根之草',s:10}, {t:'程序员的生命倒计时指示器',s:15}] },
            
            // 小游戏 4、5、6
            { type: 'game', id: 'dont_click', title: '小游戏：克制力测试', desc: '屏幕上会慢慢出现一个按钮。千万不要点它！等待5秒钟即可通关。' },
            { type: 'game', id: 'chaos_slider', title: '小游戏：抑制癫狂', desc: '拖动滑块，努力将它保持在中间绿色区域坚持2秒钟！它会自己乱动！' },
            { type: 'game', id: 'catch_btn', title: '小游戏：抓住我', desc: '按钮像抹了油一样！尝试在10秒内点到它！' },

            // === 题型5：逻辑鬼才题 ===
            { type: 'q', q: '如果1=5, 2=10, 3=15, 4=20, 那么5=？', options: [{t:'25',s:0}, {t:'0',s:5}, {t:'1',s:10}, {t:'5=1=5无限循环',s:15}] },
            { type: 'q', q: '如果所有的猫都是狗，所有的狗都是鸟，那么猫是什么？', options: [{t:'猫',s:0}, {t:'鸟',s:5}, {t:'狗',s:5}, {t:'薛定谔的猫鸟叠加态',s:15}] },
            { type: 'q', q: '如果太阳从西边出来，那么会发生什么？', options: [{t:'世界末日',s:0}, {t:'地球反转',s:5}, {t:'外星入侵',s:5}, {t:'什么都不发生，我还是要早起打工',s:15}] },
            { type: 'q', q: '生命的终极意义是？', options: [{t:'繁衍与进化',s:0}, {t:'42',s:5}, {t:'成为一个搞笑男/女',s:10}, {t:'原神，启动！',s:15}] },
            { type: 'q', q: '如果你的CP（配对）BE（悲剧结局）了，你最抽象的做法是？', options: [{t:'抱头痛哭',s:0}, {t:'换一对磕',s:0}, {t:'寄刀片给作者',s:5}, {t:'连夜写十万字同人文强行把他们写进同一个骨灰盒',s:15}] },
            
            // 小游戏 7、8
            { type: 'game', id: 'color_trap', title: '小游戏：颜色陷阱', desc: '打破视觉惯性。不要管文字写了什么，请点击文字实际所显示的【颜色】。' },
            { type: 'game', id: 'spam_click', title: '小游戏：帕金森震颤', desc: '在10秒内，以最快的速度疯狂点击按钮50次！' },

            // === 题型6：情景抽象题 ===
            { type: 'q', q: '有人问你“吃饭了吗”，你怎么抽象地回答？', options: [{t:'吃了 / 没吃',s:0}, {t:'刚吃完空气',s:5}, {t:'我在等饭自己来找我',s:10}, {t:'饭已经在我的肚子里了，只是我还没感觉到',s:15}] },
            { type: 'q', q: '你迟到了，老师问你为什么迟到，你怎么抽象地解释？', options: [{t:'起晚了',s:0}, {t:'堵车',s:0}, {t:'床把我封印了',s:10}, {t:'我的肉体到了，但灵魂还在路上',s:15}] },
            { type: 'q', q: '朋友问你在干嘛，你怎么抽象地回答？', options: [{t:'玩手机',s:0}, {t:'发呆',s:5}, {t:'在进行光合作用',s:10}, {t:'正在努力维持宇宙的熵增',s:15}] },
            { type: 'q', q: '当有人对你说“尊嘟假嘟”时，最抽象的回复是？', options: [{t:'真的',s:0}, {t:'你再说一遍？',s:0}, {t:'O.o',s:5}, {t:'根据量子力学，此时处于既尊嘟又假嘟的叠加态',s:15}] },
            { type: 'q', q: '领导下达命令：“下班前交给我”，你应该？', options: [{t:'马上去做',s:0}, {t:'准时交',s:5}, {t:'下班前一秒发出去然后拉黑领导',s:10}, {t:'把时间停止，我就永远不用交',s:15}] },
            { type: 'q', q: '“City不City啊”这句话用来评价什么最合适？', options: [{t:'上海外滩的咖啡馆',s:0}, {t:'纽约时代广场',s:5}, {t:'村头刚铺好的水泥路',s:10}, {t:'穿着人字拖逛大润发',s:15}] },
            
            // 小游戏 9、10
            { type: 'game', id: 'hold_breath', title: '小游戏：按住憋气', desc: '按住按钮不要松手。你需要凭直觉在【精确的3.0秒】时松开它。' },
            { type: 'game', id: 'fake_loading', title: '小游戏：虚假进度条', desc: '它卡在99%了，你能找到隐藏的通关机关吗？' },

            // === 最终混合题 ===
            { type: 'q', q: '如果一个“纯爱战神”遇到一个“牛头人(NTR)”，他应该使用什么武器？', options: [{t:'道德的谴责',s:0}, {t:'一起加入',s:0}, {t:'召唤纯爱结界',s:5}, {t:'物理超度（拔出四十米大刀）',s:15}] },
            { type: 'q', q: '遇到困难时，当代年轻人最常向谁求助？', options: [{t:'警察蜀黍',s:0}, {t:'亲戚朋友',s:0}, {t:'财神爷',s:10}, {t:'赛博佛祖和电子木鱼',s:15}] },
            { type: 'q', q: '“质疑xxx，理解xxx，成为xxx”，xxx最不可能是以下哪一项？', options: [{t:'大熊猫',s:5}, {t:'一只水豚(卡皮巴拉)',s:5}, {t:'宛平南路600号',s:10}, {t:'精神状态极其稳定的打工人',s:15}] },
            { type: 'q', q: '“泰裤辣”的正确使用场景是？', options: [{t:'评价一条裤子',s:0}, {t:'跑步后',s:5}, {t:'吃麻辣火锅时',s:10}, {t:'作为一段毫无逻辑的演讲结尾',s:15}] },
            { type: 'q', q: '大早上谁在发癫？', options: [{t:'邻居的狗',s:0}, {t:'楼上装修',s:0}, {t:'是我',s:10}, {t:'这个破烂不堪的世界',s:15}] },
            { type: 'q', q: '这道题没有题目，请凭借你的直觉选择正确答案：', options: [{t:'A',s:0}, {t:'C',s:5}, {t:'以上都不对',s:10}, {t:'选C的都是傻子，我选王司徒',s:15}] },

            // 最后的考验 11、12、13
            { type: 'game', id: 'volume_troll', title: '小游戏：音量刺客', desc: '强迫症测试：请将音量滑块精确地停在 50。' },
            { type: 'game', id: 'dont_do_anything', title: '小游戏：敌不动我不动', desc: '松开鼠标，离开屏幕。什么都不要做。' },
            { type: 'game', id: 'captcha_troll', title: '小游戏：抽象验证码', desc: '证明你不是机器人。点击验证。' }
        ];

        const getRank = (score) => {
            if (score < 250) return { title: "正常人类", desc: "你太正常了，这在互联网时代是一种罕见的病。", color: "text-gray-400" };
            if (score < 450) return { title: "精神状态堪忧", desc: "你已经在发疯的边缘试探了，建议多看点猫猫狗狗视频。", color: "text-green-400" };
            if (score < 650) return { title: "抽象带师", desc: "你的大脑沟壑里流淌着赛博朋克的机油，非常迷人。", color: "text-cyan-400" };
            return { title: "高维生物", desc: "地球不适合你，赶紧买张去半人马座的黄牛票吧。", color: "text-pink-500" };
        };

        const getLocalScores = () => {
            try {
                let data = JSON.parse(localStorage.getItem('abs_leaderboard_v2'));
                if (!data || data.length === 0) {
                    data = [
                        { name: "孙笑川", score: 680, rankTitle: "高维生物" },
                        { name: "马喽", score: 520, rankTitle: "抽象带师" },
                        { name: "纯爱战神", score: 300, rankTitle: "精神状态堪忧" },
                        { name: "打工人", score: 150, rankTitle: "正常人类" }
                    ];
                    localStorage.setItem('abs_leaderboard_v2', JSON.stringify(data));
                }
                return data;
            } catch (e) {
                return [];
            }
        };

        const saveScoreLocal = (scoreData) => {
            try {
                let data = getLocalScores();
                data.push(scoreData);
                data.sort((a, b) => b.score - a.score);
                data = data.slice(0, 50);
                localStorage.setItem('abs_leaderboard_v2', JSON.stringify(data));
            } catch(e) {
                console.error("Local storage error:", e);
            }
        };

        const escapeHtml = (unsafe) => {
            return (unsafe||"").toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        };

        const alertCustom = (title, message) => {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4 backdrop-blur-sm';
            overlay.innerHTML = `
                <div class="glass-panel p-6 max-w-sm w-full text-center border-pink-500 transform transition-all scale-100">
                    <h3 class="text-xl font-bold text-pink-500 mb-2">${title}</h3>
                    <p class="text-gray-300 mb-6">${message}</p>
                    <button id="closeModalBtn" class="px-6 py-2 rounded btn-abstract w-full">知道了</button>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('closeModalBtn').addEventListener('click', () => document.body.removeChild(overlay));
        };

        const appContainer = document.getElementById('app');

        const renderHTML = (html) => {
            appContainer.innerHTML = html;
        };

        const renderHome = () => {
            renderHTML(`
                <div class="text-center space-y-6">
                    <h1 class="text-3xl sm:text-5xl font-bold glitch-text mb-2">全宇宙抽象等级评估</h1>

                    <div class="mt-8">
                        <input type="text" id="playerName" placeholder="输入你的代号 (最长10字符)" maxlength="10" 
                            class="w-full sm:w-2/3 px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg focus:outline-none focus:border-pink-500 text-center text-white mb-4">
                        <button id="startBtn" class="w-full sm:w-2/3 py-3 rounded-lg font-bold text-lg btn-abstract">
                            接受精神污染 (开始)
                        </button>

                    <div class="mt-8 text-xs text-gray-500">

                    </div>

            document.getElementById('startBtn').addEventListener('click', () => {
                const name = document.getElementById('playerName').value.trim();
                if (!name) return alertCustom('请输入代号！', '否则宇宙无法记录你的存在。');
                state.userName = name;
                state.currentStep = 0;
                state.score = 0;
                renderTest();
            });
        };

        const renderTest = () => {
            if (state.currentStep >= testData.length) {
                renderResult();
                return;
            }

            const item = testData[state.currentStep];
            const progress = ((state.currentStep) / testData.length) * 100;

            let contentHtml = '';
            
            if (item.type === 'q') {
                let optionsHtml = item.options.map((opt, index) => `
                    <button data-score="${opt.s}" class="w-full text-left p-4 rounded-lg option-btn text-white text-sm sm:text-base answer-btn">
                        <span class="font-bold text-pink-500 mr-2">${String.fromCharCode(65 + index)}.</span> ${opt.t}
                    </button>
                `).join('');

                contentHtml = `
                    <h2 class="text-xl sm:text-2xl font-bold mb-6 leading-relaxed">${item.q}</h2>
                    <div class="space-y-3">${optionsHtml}</div>
                `;
            } else if (item.type === 'game') {
                contentHtml = `
                    <h2 class="text-xl sm:text-2xl font-bold mb-2 text-cyan-400">${item.title}</h2>
                    <p class="text-gray-400 text-sm mb-4">${item.desc}</p>
                    <div id="game-area" class="w-full rounded-lg relative flex flex-col items-center justify-center"></div>
                `;
            }

            renderHTML(`
                <div class="mb-6 flex justify-between text-xs text-gray-400 font-mono">
                    <span>进度: ${state.currentStep + 1} / ${testData.length}</span>
                    <span>当前抽象值: ${state.score}</span>
                </div>
                <div class="w-full bg-gray-800 rounded-full h-2 mb-8 border border-gray-700">
                    <div class="bg-gradient-to-r from-pink-500 to-cyan-500 h-full rounded-full transition-all duration-300" style="width: ${progress}%"></div>
                </div>
                ${contentHtml}
            `);

            if (item.type === 'q') {
                document.querySelectorAll('.answer-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const score = parseInt(e.currentTarget.getAttribute('data-score'));
                        handleAnswer(score);
                    });
                });
            } else if (item.type === 'game') {
                initGame(item.id);
            }
        };

        const handleAnswer = (earnedScore) => {
            state.score += earnedScore;
            state.currentStep++;
            renderTest();
        };

        const initGame = (gameId) => {
            const container = document.getElementById('game-area');
            
            if (gameId === 'stare_abyss') {
                container.innerHTML = `
                    <div id="game-container" class="flex flex-col items-center justify-center bg-black py-8">

                    stillTime = 0; timerText.innerText = '0.0'; prog.style.width = '0%';
                    eye.classList.replace('text-purple-700', 'text-red-500'); eye.classList.replace('fa-eye', 'fa-dizzy');
                    abyss.classList.add('scale-110', 'border-red-500', 'shadow-[0_0_30px_rgba(239,68,68,0.8)]');
                    setTimeout(() => {
                        if (!win) {
                            eye.classList.replace('text-red-500', 'text-purple-700'); eye.classList.replace('fa-dizzy', 'fa-eye');
                            abyss.classList.remove('scale-110', 'border-red-500', 'shadow-[0_0_30px_rgba(239,68,68,0.8)]');
                        }
                    }, 300);
                };
                const handleMove = (x, y) => {
                    if (!isInside || win) return;
                    if (lastX !== null && lastY !== null && (Math.abs(x - lastX) + Math.abs(y - lastY) > 2)) resetStare();
                    lastX = x; lastY = y;
                };

                abyss.addEventListener('mouseenter', () => isInside = true);
                abyss.addEventListener('mouseleave', () => { isInside = false; resetStare(); lastX = null; lastY = null; });
                window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));

                abyss.addEventListener('touchend', () => { isInside = false; resetStare(); lastX = null; lastY = null; });

                timerInterval = setInterval(() => {

                        stillTime += 0.1; timerText.innerText = stillTime.toFixed(1); prog.style.width = Math.min((stillTime / 3) * 100, 100) + '%';

                            win = true; clearInterval(timerInterval);

                muyu.addEventListener('mousedown', e => { e.preventDefault(); handleHit(e); }); muyu.addEventListener('touchstart', e => { e.preventDefault(); handleHit(e); }, { passive: false });

            else if (gameId === 'catch_btn') {

            else if (gameId === 'spam_click') {

                        if(tries > 4) { slider.value = 50; val.innerText = "50"; val.classList.replace('text-cyan-400', 'text-green-400'); slider.disabled = true; setTimeout(() => handleAnswer(15), 1000); return; }
                    }
                    val.innerText = v;
                });
            }

            else if (gameId === 'dont_do_anything') {
                container.innerHTML = `
                    <div class="text-center py-10 w-full">
                        <h3 class="text-3xl font-bold text-red-500 mb-4 glitch-text">别动！</h3>
                        <p class="text-gray-400 mb-8">松开鼠标，放下手机，不要进行任何操作。<br>保持绝对静默 3 秒。</p>
                        <div class="w-full max-w-sm mx-auto bg-gray-800 h-2 rounded overflow-hidden"><div id="silence-bar" class="bg-cyan-500 h-full w-0"></div></div>
                    </div>
                `;
                const bar = document.getElementById('silence-bar');
                let stillT = 0, done = false;
                let timer = setInterval(() => {
                    if(done) return; stillT += 0.1; bar.style.width = (stillT/3 * 100) + '%';
                    if(stillT >= 3) { done = true; clearInterval(timer); cleanup(); bar.classList.replace('bg-cyan-500', 'bg-green-500'); setTimeout(() => handleAnswer(15), 1000); }
                }, 100);
                const fail = () => {
                    if(done || stillT <= 0.3) return;
                    stillT = 0; bar.classList.replace('bg-cyan-500', 'bg-red-500'); setTimeout(() => { if(!done) bar.classList.replace('bg-red-500', 'bg-cyan-500'); }, 200);
                };
                const cleanup = () => { window.removeEventListener('mousemove', fail); window.removeEventListener('keydown', fail); window.removeEventListener('touchmove', fail); };
                window.addEventListener('mousemove', fail); window.addEventListener('keydown', fail); window.addEventListener('touchmove', fail);
            }

            else if (gameId === 'captcha_troll') {
                container.innerHTML = `
                    <div class="text-center py-4 w-full">
                        <p class="text-white mb-4">请点击验证：选出所有<span class="text-pink-500 font-bold">抽象</span>的图片</p>
                        <div class="grid grid-cols-3 gap-2 w-full max-w-[240px] mx-auto mb-6">
                            ${Array(9).fill(0).map((_, i) => `<div class="bg-gray-700 w-full aspect-square cursor-pointer border-2 border-transparent hover:border-gray-500 cap-box transition-colors"></div>`).join('')}
                        </div>
                        <button id="cap-verify" class="px-6 py-2 bg-blue-600 rounded text-white font-bold opacity-50 cursor-not-allowed transition-transform">验证</button>
                    </div>
                `;
                let clicks = 0; const btn = document.getElementById('cap-verify');
                document.querySelectorAll('.cap-box').forEach(box => {
                    box.addEventListener('click', e => {
                        const t = e.target;
                        if(t.classList.contains('bg-gray-700')) t.classList.replace('bg-gray-700', 'bg-pink-500'); else t.classList.replace('bg-pink-500', 'bg-gray-700');
                        clicks++;
                        if(clicks === 2 || clicks === 4) btn.style.transform = `translate(${(Math.random()-0.5)*150}px, ${(Math.random()-0.5)*50}px)`;
                        if(clicks >= 5) { btn.classList.remove('opacity-50', 'cursor-not-allowed'); btn.style.transform = 'translate(0,0)'; }
                    });
                });
                btn.addEventListener('click', () => { if(clicks >= 5) { btn.innerText = "验证通过"; btn.classList.replace('bg-blue-600', 'bg-green-500'); setTimeout(() => handleAnswer(15), 800); } });
            }
        };

        const renderResult = async () => {
            const rank = getRank(state.score);
            
            renderHTML(`
                <div class="text-center space-y-6">
                    <h2 class="text-2xl font-bold">评估完成</h2>
                    <div class="py-6">
                        <p class="text-gray-400 mb-2">你的总抽象值</p>
                        <div class="text-6xl font-bold glitch-text mb-4">${state.score}</div>
                        <p class="text-gray-400 mb-2">你的宇宙阶级</p>
                        <div class="text-3xl font-bold ${rank.color} mb-2">${rank.title}</div>
                        <p class="text-sm text-gray-300 italic">"${rank.desc}"</p>
                    </div>
                    <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
                        <button id="viewLdbBtn" class="px-6 py-3 rounded-lg font-bold bg-gray-800 border border-gray-600 hover:bg-gray-700 transition">
                            <i class="fas fa-trophy text-yellow-500 mr-2"></i> 查看抽象排行榜
                        </button>
                        <button id="retryBtn" class="px-6 py-3 rounded-lg font-bold btn-abstract">
                            重新洗脑 (再测一次)
                        </button>
                    </div>
                </div>
            `);

            if (state.score > 0) {
                const scoreData = { name: state.userName, score: state.score, rankTitle: rank.title, timestamp: new Date().getTime() };
                try {
                    await fetch('/api/scores', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(scoreData) });
                    state.usingLocal = false;
                } catch (e) {
                    console.warn("API请求失败，降级为本地存储", e);
                    saveScoreLocal(scoreData);
                    state.usingLocal = true;
                }
            }

            document.getElementById('viewLdbBtn').addEventListener('click', () => renderLeaderboard());
            document.getElementById('retryBtn').addEventListener('click', () => renderHome());
        };

        const renderLeaderboardList = (data) => {
            const contentDiv = document.getElementById('ldb-content');
            if (!contentDiv) return;
            
            if (data.length === 0) {
                contentDiv.innerHTML = '<div class="text-center text-gray-500 py-10">这里还是一片虚无...</div>'; return;
            }

            contentDiv.innerHTML = data.map((item, index) => {
                let medal = index === 0 ? '<i class="fas fa-crown text-yellow-400 ml-2"></i>' : (index === 1 ? '<i class="fas fa-medal text-gray-300 ml-2"></i>' : (index === 2 ? '<i class="fas fa-medal text-amber-600 ml-2"></i>' : ''));
                return `
                    <div class="flex justify-between items-center p-3 rounded-lg bg-gray-800/50 border border-gray-700 hover:border-cyan-500/50 transition">
                        <div class="flex items-center">
                            <span class="w-6 text-gray-500 font-mono text-sm">${index + 1}.</span>
                            <span class="font-bold ml-2 text-gray-200">${escapeHtml(item.name)}</span>${medal}
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-xs text-pink-400 hidden sm:inline">${item.rankTitle || ''}</span>
                            <span class="font-bold text-cyan-300 font-mono">${item.score} pt</span>
                        </div>
                    </div>
                `;
            }).join('');
        };

        const renderLeaderboard = async () => {
            renderHTML(`
                <div class="space-y-4">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-cyan-400"><i class="fas fa-satellite-dish mr-2"></i> 宇宙抽象波频记录板</h2>
                        <button id="backBtn" class="text-gray-400 hover:text-white transition"><i class="fas fa-arrow-left"></i> 返回</button>
                    </div>
                    <div id="ldb-content" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2">
                        <div class="text-center text-gray-500 py-10"><i class="fas fa-spinner fa-spin mr-2"></i> 正在同步平行宇宙数据...</div>
                    </div>
                </div>
            `);

            document.getElementById('backBtn').addEventListener('click', renderResult);

            try {
                const response = await fetch('/api/scores');
                if (!response.ok) throw new Error('网络维度断开连接');
                let data = await response.json();
                if (data.length === 0) data = getLocalScores(); 
                renderLeaderboardList(data);
            } catch (error) {
                console.warn("无法连接到抽象排行榜服务器，显示本地幻觉...", error);
                renderLeaderboardList(getLocalScores());
            }
        };

        const initApp = () => renderHome();
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
