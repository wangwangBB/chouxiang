<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全宇宙抽象等级评估系统 v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'ZCOOL KuaiLe', 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 0, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 255, 255, 0.05), transparent 25%);
        }

        .glitch-text {
            text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan);
            animation: glitch 2s infinite alternate-reverse;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); }
            20% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); }
            40% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); }
            60% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); transform: translate(1px, 1px); }
            80% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); transform: translate(-1px, -1px); }
            100% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .btn-abstract {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
            border: none;
            color: white;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .btn-abstract:hover {
            transform: scale(1.05) rotate(-1deg);
            box-shadow: 0 0 15px var(--neon-pink), 0 0 15px var(--neon-cyan);
        }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .option-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: var(--neon-cyan);
            transform: translateX(5px);
        }

        /* Game specific styles */
        #game-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: #000;
            border: 2px solid var(--neon-pink);
            border-radius: 0.5rem;
            overflow: hidden;
            touch-action: none;
        }

        .moving-dot {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: var(--neon-cyan);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        input[type=range].chaos-slider {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range].chaos-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 30px;
            width: 30px;
            border-radius: 50%;
            background: var(--neon-pink);
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 10px var(--neon-pink);
        }
        input[type=range].chaos-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 10px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Main Application Container -->
    <div id="app" class="w-full max-w-2xl glass-panel p-6 sm:p-8 relative">
        <!-- Content will be injected here by JS -->
        <div class="text-center py-10">
            <i class="fas fa-spinner fa-spin text-4xl text-pink-500"></i>
            <p class="mt-4 text-cyan-400">正在连接宇宙意识网络...</p>
        </div>
    </div>

    <script type="module">
        let state = {
            currentStep: -1,
            score: 0,
            userName: "",
            userId: "user_" + Math.random().toString(36).substr(2, 9), // 随机生成用户ID
            leaderboardData: [],
            usingLocal: false
        };

        const testData = [
            { type: 'q', q: '已知今天是星期四，此时最合理的行为是？', options: [{t:'好好学习，天天向上',s:0}, {t:'在群里发一段没人看的长文然后求V50',s:10}, {t:'变成一块疯狂的炸鸡',s:8}, {t:'准时下班',s:0}] },
            { type: 'q', q: '作为一只合格的“吗喽”，面对早八或工作时你的内心OS是？', options: [{t:'充满干劲',s:0}, {t:'吗喽的命也是命，天塌下来有高个子顶',s:10}, {t:'思考如何反向进化为阿米巴原虫',s:8}, {t:'我爱工作',s:0}] },
            { type: 'game', id: 'stare_abyss', title: '小游戏：凝视深渊', desc: '把鼠标指针停在深渊中心（手机端则按住不放），保持绝对静止3秒钟。任何微小的颤抖都会导致重新计时。' },
            { type: 'q', q: '当有人对你说“尊嘟假嘟”时，最抽象的回复是？', options: [{t:'真的',s:0}, {t:'O.o',s:5}, {t:'根据量子力学，此时处于既尊嘟又假嘟的叠加态',s:10}, {t:'你再说一遍？',s:0}] },
            { type: 'q', q: '“恐龙抗狼”的终极物理学含义是？', options: [{t:'云南非物质文化遗产',s:0}, {t:'描述宇宙大爆炸时产生的引力波音效',s:10}, {t:'一种强力的镇定剂',s:5}, {t:'不知道',s:0}] },
            { type: 'game', id: 'abstract_typing', title: '小游戏：外星电报', desc: '在输入框里随便打字，只要打出5个字符即可通关，但你看到的可能不是你打的。' },
            { type: 'q', q: '加入“麦门”后，你的灵魂会变成什么形状？', options: [{t:'M字形',s:5}, {t:'一根金黄酥脆永远不会软塌的薯条',s:10}, {t:'完美的圆形',s:0}, {t:'汉堡包',s:2}] },
            { type: 'q', q: '“哈基米”原本在二次元语境里是指什么？', options: [{t:'可爱的小猫咪',s:0}, {t:'所有毛茸茸的动物',s:0}, {t:'赛马娘里喝的蜂蜜水',s:10}, {t:'一种神秘魔法阵',s:8}] },
            { type: 'game', id: 'chaos_slider', title: '小游戏：抑制癫狂', desc: '拖动滑块，努力将它保持在中间绿色区域坚持2秒钟！它会自己乱动！' },
            { type: 'q', q: '如果一个“纯爱战神”遇到一个“牛头人(NTR)”，他应该使用什么武器？', options: [{t:'道德的谴责',s:0}, {t:'物理超度（拔出四十米大刀）',s:10}, {t:'一起加入',s:0}, {t:'召唤纯爱结界',s:8}] },
            { type: 'q', q: '遇到困难时，当代年轻人最常向谁求助？', options: [{t:'警察蜀黍',s:0}, {t:'亲戚朋友',s:0}, {t:'赛博佛祖和电子木鱼',s:10}, {t:'财神爷',s:8}] },
            { type: 'game', id: 'wooden_fish', title: '小游戏：赛博木鱼', desc: '虔诚地敲击木鱼。精确敲击49下后点击“功德圆满”。多敲一下则功德清零，前功尽弃！' },
            { type: 'q', q: '“质疑xxx，理解xxx，成为xxx”，xxx最不可能是以下哪一项？', options: [{t:'宛平南路600号',s:8}, {t:'精神状态极其稳定的打工人',s:10}, {t:'大熊猫',s:5}, {t:'一只水豚(卡皮巴拉)',s:5}] },
            { type: 'q', q: '生命的终极意义是？', options: [{t:'42',s:5}, {t:'繁衍与进化',s:0}, {t:'成为一个搞笑男/女',s:8}, {t:'原神，启动！',s:10}] },
            { type: 'q', q: '如果你的CP（配对）BE（悲剧结局）了，你最抽象的做法是？', options: [{t:'抱头痛哭',s:0}, {t:'寄刀片给作者',s:5}, {t:'连夜写十万字同人文强行把他们写进同一个骨灰盒',s:10}, {t:'换一对磕',s:0}] },
            { type: 'game', id: 'dont_click', title: '小游戏：克制力测试', desc: '屏幕上会慢慢出现一个按钮。千万不要点它！等待5秒钟即可通关。' },
            { type: 'q', q: '“City不City啊”这句话用来评价什么最合适？', options: [{t:'上海外滩的咖啡馆',s:0}, {t:'穿着人字拖逛大润发',s:10}, {t:'纽约时代广场',s:5}, {t:'村头刚铺好的水泥路',s:8}] },
            { type: 'q', q: '大早上谁在发癫？', options: [{t:'邻居的狗',s:0}, {t:'楼上装修',s:0}, {t:'是我',s:10}, {t:'这个破烂不堪的世界',s:8}] },
            { type: 'q', q: '这道题没有题目，请凭借你的直觉选择正确答案：', options: [{t:'A',s:0}, {t:'C',s:5}, {t:'选C的都是傻子，我选王司徒',s:10}, {t:'以上都不对',s:8}] },
            { type: 'q', q: '最后一道题：做完这套测试，你的精神状态如何？', options: [{t:'非常正常',s:0}, {t:'有点迷茫',s:5}, {t:'想去大街上随便抓个人咬一口',s:10}, {t:'阿巴阿巴阿巴...',s:10}] }
        ];

        const getRank = (score) => {
            if (score < 50) return { title: "正常人类", desc: "你太正常了，这在互联网时代是一种罕见的病。", color: "text-gray-400" };
            if (score < 100) return { title: "精神状态堪忧", desc: "你已经在发疯的边缘试探了，建议多看点猫猫狗狗视频。", color: "text-green-400" };
            if (score < 150) return { title: "抽象带师", desc: "你的大脑沟壑里流淌着赛博朋克的机油，非常迷人。", color: "text-cyan-400" };
            return { title: "高维生物", desc: "地球不适合你，赶紧买张去半人马座的黄牛票吧。", color: "text-pink-500" };
        };

        const getLocalScores = () => {
            try {
                let data = JSON.parse(localStorage.getItem('abs_leaderboard'));
                if (!data || data.length === 0) {
                    data = [
                        { name: "孙笑川", score: 195, rankTitle: "高维生物" },
                        { name: "马喽", score: 140, rankTitle: "抽象带师" },
                        { name: "纯爱战神", score: 90, rankTitle: "精神状态堪忧" },
                        { name: "打工人", score: 20, rankTitle: "正常人类" }
                    ];
                    localStorage.setItem('abs_leaderboard', JSON.stringify(data));
                }
                return data;
            } catch (e) {
                return [];
            }
        };

        const saveScoreLocal = (scoreData) => {
            try {
                let data = getLocalScores();
                data.push(scoreData);
                localStorage.setItem('abs_leaderboard', JSON.stringify(data));
            } catch(e) {
                console.error("Local storage error:", e);
            }
        };

        const renderLeaderboardList = (data) => {
            const contentDiv = document.getElementById('ldb-content');
            if (!contentDiv) return;
            
            if (data.length === 0) {
                contentDiv.innerHTML = '<div class="text-center text-gray-500 py-10">这里还是一片虚无...</div>';
                return;
            }

            let listHtml = data.map((item, index) => {
                let medal = '';
                if (index === 0) medal = '<i class="fas fa-crown text-yellow-400 ml-2"></i>';
                else if (index === 1) medal = '<i class="fas fa-medal text-gray-300 ml-2"></i>';
                else if (index === 2) medal = '<i class="fas fa-medal text-amber-600 ml-2"></i>';

                return `
                    <div class="flex justify-between items-center p-3 rounded-lg bg-gray-800/50 border border-gray-700 hover:border-cyan-500/50 transition">
                        <div class="flex items-center">
                            <span class="w-6 text-gray-500 font-mono text-sm">${index + 1}.</span>
                            <span class="font-bold ml-2 text-gray-200">${escapeHtml(item.name)}</span>
                            ${medal}
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-xs text-pink-400 hidden sm:inline">${item.rankTitle || ''}</span>
                            <span class="font-bold text-cyan-300 font-mono">${item.score} pt</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            if(state.currentStep === 21) { 
                contentDiv.innerHTML = listHtml;
            }
        };

        const appContainer = document.getElementById('app');

        const renderHTML = (html) => {
            appContainer.innerHTML = html;
        };

        const renderHome = () => {
            renderHTML(`
                <div class="text-center space-y-6">
                    <h1 class="text-3xl sm:text-5xl font-bold glitch-text mb-2">全宇宙抽象等级评估</h1>
                    <p class="text-gray-300 text-sm sm:text-base">警告：本测试可能导致大脑短路、三观重塑或突然渴望吃生土豆。包含15道选择题与5个抽象交互。</p>
                    <div class="mt-8">
                        <input type="text" id="playerName" placeholder="输入你的代号 (最长10字符)" maxlength="10" 
                            class="w-full sm:w-2/3 px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg focus:outline-none focus:border-pink-500 text-center text-white mb-4">
                        <button id="startBtn" class="w-full sm:w-2/3 py-3 rounded-lg font-bold text-lg btn-abstract">
                            接受精神污染 (开始)
                        </button>
                    </div>
                    <div class="mt-8 text-xs text-gray-500">
                        <p>Powered by 纯粹的荒诞</p>
                    </div>
                </div>
            `);

            document.getElementById('startBtn').addEventListener('click', () => {
                const name = document.getElementById('playerName').value.trim();
                if (!name) return alertCustom('请输入代号！', '否则宇宙无法记录你的存在。');
                state.userName = name;
                state.currentStep = 0;
                state.score = 0;
                renderTest();
            });
        };

        const renderTest = () => {
            if (state.currentStep >= testData.length) {
                state.currentStep = 20; 
                renderResult();
                return;
            }

            const item = testData[state.currentStep];
            const progress = ((state.currentStep) / testData.length) * 100;

            let contentHtml = '';
            
            if (item.type === 'q') {
                let optionsHtml = item.options.map((opt, index) => `
                    <button data-score="${opt.s}" class="w-full text-left p-4 rounded-lg option-btn text-white text-sm sm:text-base answer-btn">
                        <span class="font-bold text-pink-500 mr-2">${String.fromCharCode(65 + index)}.</span> ${opt.t}
                    </button>
                `).join('');

                contentHtml = `
                    <h2 class="text-xl sm:text-2xl font-bold mb-6 leading-relaxed">${item.q}</h2>
                    <div class="space-y-3">${optionsHtml}</div>
                `;
            } else if (item.type === 'game') {
                contentHtml = `
                    <h2 class="text-xl sm:text-2xl font-bold mb-2 text-cyan-400">${item.title}</h2>
                    <p class="text-gray-400 text-sm mb-4">${item.desc}</p>
                    <div id="game-area" class="w-full rounded-lg relative flex flex-col items-center justify-center">
                        <!-- Game specific DOM will be injected here -->
                    </div>
                `;
            }

            renderHTML(`
                <div class="mb-6 flex justify-between text-xs text-gray-400 font-mono">
                    <span>进度: ${state.currentStep + 1} / ${testData.length}</span>
                    <span>当前抽象值: ${state.score}</span>
                </div>
                <div class="w-full bg-gray-800 rounded-full h-2 mb-8">
                    <div class="bg-gradient-to-r from-pink-500 to-cyan-500 h-2 rounded-full transition-all duration-300" style="width: ${progress}%"></div>
                </div>
                ${contentHtml}
            `);

            if (item.type === 'q') {
                document.querySelectorAll('.answer-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const score = parseInt(e.currentTarget.getAttribute('data-score'));
                        handleAnswer(score);
                    });
                });
            } else if (item.type === 'game') {
                initGame(item.id);
            }
        };

        const handleAnswer = (earnedScore) => {
            state.score += earnedScore;
            state.currentStep++;
            renderTest();
        };

        const initGame = (gameId) => {
            const container = document.getElementById('game-area');
            
            if (gameId === 'stare_abyss') {
                container.innerHTML = `
                    <div id="game-container" class="flex flex-col items-center justify-center bg-black py-8">
                        <div id="abyss" class="w-24 h-24 sm:w-32 sm:h-32 rounded-full border-4 border-purple-600 bg-gradient-to-b from-gray-900 to-black flex items-center justify-center cursor-crosshair shadow-[0_0_30px_rgba(147,51,234,0.5)] transition-all">
                            <i class="fas fa-eye text-purple-700 text-3xl sm:text-4xl" id="abyss-eye"></i>
                        </div>
                        <div class="mt-6 text-gray-400 font-mono text-sm">绝对静止时间: <span id="still-timer">0.0</span>s / 3.0s</div>
                        <div class="w-3/4 bg-gray-800 h-2 mt-3 rounded overflow-hidden"><div id="still-prog" class="bg-purple-600 h-full w-0 transition-all duration-100"></div></div>
                    </div>
                `;
                const abyss = document.getElementById('abyss');
                const timerText = document.getElementById('still-timer');
                const prog = document.getElementById('still-prog');
                const eye = document.getElementById('abyss-eye');

                let stillTime = 0;
                let lastX = null;
                let lastY = null;
                let isInside = false;
                let timerInterval = null;
                let win = false;

                const resetStare = () => {
                    if (win) return;
                    stillTime = 0;
                    timerText.innerText = '0.0';
                    prog.style.width = '0%';
                    eye.classList.remove('text-purple-700', 'fa-eye');
                    eye.classList.add('text-red-500', 'fa-dizzy'); // 颤抖时眼球变红变晕
                    abyss.classList.add('scale-110', 'border-red-500', 'shadow-[0_0_30px_rgba(239,68,68,0.8)]');
                    abyss.classList.remove('border-purple-600', 'shadow-[0_0_30px_rgba(147,51,234,0.5)]');
                    setTimeout(() => {
                        if (!win) {
                            eye.classList.add('text-purple-700', 'fa-eye');
                            eye.classList.remove('text-red-500', 'fa-dizzy');
                            abyss.classList.remove('scale-110', 'border-red-500', 'shadow-[0_0_30px_rgba(239,68,68,0.8)]');
                            abyss.classList.add('border-purple-600', 'shadow-[0_0_30px_rgba(147,51,234,0.5)]');
                        }
                    }, 300);
                };

                const handleMove = (x, y) => {
                    if (!isInside || win) return;
                    if (lastX !== null && lastY !== null) {
                        // 允许极小的像素抖动（防误触），大于2个像素则判定为移动
                        const dist = Math.abs(x - lastX) + Math.abs(y - lastY);
                        if (dist > 2) { 
                            resetStare();
                        }
                    }
                    lastX = x;
                    lastY = y;
                };

                // 鼠标事件
                abyss.addEventListener('mouseenter', () => { isInside = true; });
                abyss.addEventListener('mouseleave', () => { isInside = false; resetStare(); lastX = null; lastY = null; });
                window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));

                // 触摸事件
                abyss.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    isInside = true;
                    lastX = e.touches[0].clientX;
                    lastY = e.touches[0].clientY;
                }, { passive: false });
                window.addEventListener('touchmove', (e) => {
                    if(isInside) e.preventDefault();
                    handleMove(e.touches[0].clientX, e.touches[0].clientY);
                }, { passive: false });
                abyss.addEventListener('touchend', () => { isInside = false; resetStare(); lastX = null; lastY = null; });

                timerInterval = setInterval(() => {
                    if (isInside && !win) {
                        stillTime += 0.1;
                        timerText.innerText = stillTime.toFixed(1);
                        prog.style.width = Math.min((stillTime / 3) * 100, 100) + '%';
                        if (stillTime >= 3.0) {
                            win = true;
                            clearInterval(timerInterval);
                            eye.classList.remove('fa-eye', 'text-purple-700');
                            eye.classList.add('fa-check-circle', 'text-green-400');
                            abyss.classList.remove('border-purple-600', 'shadow-[0_0_30px_rgba(147,51,234,0.5)]');
                            abyss.classList.add('border-green-400', 'shadow-[0_0_50px_rgba(74,222,128,0.8)]');
                            setTimeout(() => handleAnswer(10), 1000);
                        }
                    }
                }, 100);
            } 
            
            else if (gameId === 'abstract_typing') {
                const emojis = ['👽', '👾', '💩', '🧠', '👁️', '🌀', '🎭', '🧻'];
                container.innerHTML = `
                    <input type="text" id="weird-input" placeholder="随便打点什么..." class="w-full p-4 bg-gray-900 border-2 border-cyan-500 rounded-lg text-2xl text-center focus:outline-none">
                    <p class="mt-4 text-sm text-gray-500">已输入字符: <span id="char-count">0</span>/5</p>
                `;
                const input = document.getElementById('weird-input');
                const countSpan = document.getElementById('char-count');
                let count = 0;
                
                input.addEventListener('input', (e) => {
                    count++;
                    countSpan.innerText = count;
                    let weirdString = '';
                    for(let i=0; i<count; i++) weirdString += emojis[Math.floor(Math.random() * emojis.length)];
                    input.value = weirdString;
                    
                    if (count >= 5) {
                        input.disabled = true;
                        input.classList.add('border-pink-500');
                        setTimeout(() => handleAnswer(10), 500);
                    }
                });
            }

            else if (gameId === 'chaos_slider') {
                container.innerHTML = `
                    <div class="w-full h-12 bg-gray-800 rounded relative overflow-hidden mb-4 border border-gray-600">
                        <div class="absolute top-0 bottom-0 left-[40%] right-[40%] bg-green-500/20 border-x border-green-500"></div>
                        <input type="range" min="0" max="100" value="10" id="c-slider" class="chaos-slider absolute top-1/2 -translate-y-1/2 w-full z-10">
                    </div>
                    <div class="w-full bg-gray-700 h-2 rounded"><div id="hold-progress" class="bg-green-400 h-full rounded w-0"></div></div>
                `;
                const slider = document.getElementById('c-slider');
                const prog = document.getElementById('hold-progress');
                let holdTime = 0;
                let isDragging = false;
                
                slider.addEventListener('mousedown', () => isDragging = true);
                slider.addEventListener('touchstart', () => isDragging = true);
                window.addEventListener('mouseup', () => isDragging = false);
                window.addEventListener('touchend', () => isDragging = false);

                let interval = setInterval(() => {
                    if(!isDragging && Math.random() > 0.3) {
                         slider.value = parseInt(slider.value) + (Math.random() - 0.5) * 40;
                    } else if (isDragging) {
                         slider.value = parseInt(slider.value) + (Math.random() - 0.5) * 10;
                    }

                    const val = parseInt(slider.value);
                    if (val >= 40 && val <= 60) {
                        holdTime += 100;
                    } else {
                        holdTime = Math.max(0, holdTime - 50);
                    }
                    
                    prog.style.width = (holdTime / 2000 * 100) + '%';

                    if (holdTime >= 2000) {
                        clearInterval(interval);
                        prog.classList.replace('bg-green-400', 'bg-pink-500');
                        slider.disabled = true;
                        setTimeout(() => handleAnswer(10), 500);
                    }
                }, 100);
            }

            else if (gameId === 'wooden_fish') {
                container.innerHTML = `
                    <div id="game-container" class="relative w-full bg-gray-900 rounded-lg flex flex-col items-center justify-center p-6 h-64 overflow-hidden select-none border border-amber-900/50">
                        <div id="merit-msg" class="absolute top-4 text-sm text-gray-500 transition-colors duration-300">心诚则灵，勿生贪念</div>
                        <div id="merit-count" class="text-3xl font-bold text-amber-500 mb-6 font-mono z-10 drop-shadow-md">功德: 0</div>
                        
                        <!-- 木鱼主体 -->
                        <div id="muyu" class="relative w-28 h-20 bg-gradient-to-br from-amber-700 to-amber-900 rounded-full cursor-pointer flex items-center justify-center shadow-[0_10px_20px_rgba(0,0,0,0.5),inset_0_3px_5px_rgba(255,255,255,0.2)] transition-transform active:scale-95 z-10">
                            <div class="absolute w-16 h-6 border-t-4 border-amber-950/40 rounded-full top-2"></div>
                            <div class="absolute w-2 h-2 bg-amber-950/30 rounded-full right-4 top-8"></div>
                        </div>
                        
                        <button id="finish-btn" class="mt-8 px-6 py-2 bg-gray-700 rounded text-gray-300 font-bold opacity-50 cursor-not-allowed transition-all z-10">功德圆满</button>
                    </div>
                `;
                const box = document.getElementById('game-container');
                const muyu = document.getElementById('muyu');
                const countDisplay = document.getElementById('merit-count');
                const finishBtn = document.getElementById('finish-btn');
                const msgDisplay = document.getElementById('merit-msg');
                
                let merits = 0;
                let gameOver = false;

                const createFloatingText = (x, y) => {
                    const el = document.createElement('div');
                    el.innerText = '功德+1';
                    el.className = 'absolute text-amber-400 font-bold pointer-events-none transition-all duration-700 ease-out z-20 text-lg drop-shadow-md';
                    
                    // 让文字在敲击点附近随机稍微偏移
                    const offsetX = (Math.random() - 0.5) * 40;
                    el.style.left = (x + offsetX) + 'px';
                    el.style.top = y + 'px';
                    el.style.transform = 'translate(-50%, -50%)';
                    el.style.opacity = '1';
                    box.appendChild(el);

                    // 触发浏览器重绘
                    void el.offsetWidth;

                    // 向上飘逸并淡出
                    el.style.top = (y - 80) + 'px';
                    el.style.opacity = '0';

                    setTimeout(() => el.remove(), 700);
                };

                const handleHit = (e) => {
                    if(gameOver) return;
                    
                    // 获取点击坐标 (兼容触屏和鼠标)
                    let clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    let clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    
                    if(!clientX || !clientY) {
                        const rect = box.getBoundingClientRect();
                        clientX = rect.left + rect.width / 2;
                        clientY = rect.top + rect.height / 2;
                    }

                    const rect = box.getBoundingClientRect();
                    const relX = clientX - rect.left;
                    const relY = clientY - rect.top;

                    createFloatingText(relX, relY);
                    merits++;
                    
                    // 核心判断逻辑
                    if (merits > 49) {
                        merits = 0;
                        countDisplay.innerText = "功德: 0";
                        msgDisplay.innerText = "贪欲大起，功德尽失！重头来过";
                        msgDisplay.classList.replace('text-gray-500', 'text-red-500');
                        msgDisplay.classList.replace('text-amber-400', 'text-red-500');
                        box.classList.add('bg-red-900/30');
                        
                        setTimeout(() => {
                            msgDisplay.classList.replace('text-red-500', 'text-gray-500');
                            box.classList.remove('bg-red-900/30');
                            msgDisplay.innerText = "心诚则灵，勿生贪念";
                        }, 1500);
                    } else {
                        countDisplay.innerText = `功德: ${merits}`;
                    }

                    // 达到精确的49下时激活按钮
                    if (merits === 49) {
                        finishBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-gray-700', 'text-gray-300');
                        finishBtn.classList.add('hover:bg-amber-500', 'bg-amber-600', 'text-white', 'shadow-[0_0_15px_rgba(245,158,11,0.6)]');
                        msgDisplay.innerText = "功德已满，请速速离场";
                        msgDisplay.classList.replace('text-gray-500', 'text-amber-400');
                    } else {
                        finishBtn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-gray-700', 'text-gray-300');
                        finishBtn.classList.remove('hover:bg-amber-500', 'bg-amber-600', 'text-white', 'shadow-[0_0_15px_rgba(245,158,11,0.6)]');
                        if (merits > 0 && merits < 49 && msgDisplay.classList.contains('text-amber-400')) {
                            msgDisplay.classList.replace('text-amber-400', 'text-gray-500');
                            msgDisplay.innerText = "心诚则灵，勿生贪念";
                        }
                    }
                };

                // 绑定点击和触摸事件
                muyu.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    handleHit(e);
                });
                
                muyu.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleHit(e);
                }, { passive: false });

                // 提交按钮事件
                finishBtn.addEventListener('click', () => {
                    if (merits === 49 && !gameOver) {
                        gameOver = true;
                        finishBtn.innerText = "🙏 善哉善哉";
                        setTimeout(() => handleAnswer(15), 1000);
                    }
                });
            }

            else if (gameId === 'dont_click') {
                container.innerHTML = `
                    <div id="game-container" class="flex items-center justify-center">
                        <button id="tempt-btn" class="bg-red-600 text-white font-bold py-2 px-4 rounded opacity-0 transition-opacity duration-1000 transform scale-50">千万别点我</button>
                        <div class="absolute bottom-2 text-white text-xl font-mono" id="countdown">5</div>
                    </div>
                `;
                const btn = document.getElementById('tempt-btn');
                const cd = document.getElementById('countdown');
                let time = 5;
                let clicked = false;
                
                setTimeout(() => { btn.style.opacity = '1'; btn.style.transform = 'scale(1)'; }, 1000);
                
                btn.addEventListener('click', () => {
                    clicked = true;
                    btn.innerText = "你点它干嘛？";
                    btn.classList.replace('bg-red-600', 'bg-gray-600');
                    cd.innerText = "失败";
                    setTimeout(() => handleAnswer(0), 1000); 
                });

                let interval = setInterval(() => {
                    if (clicked) { clearInterval(interval); return; }
                    time--;
                    cd.innerText = time;
                    if (time <= 0) {
                        clearInterval(interval);
                        btn.style.opacity = '0';
                        cd.innerText = "意志坚定！";
                        cd.classList.add('text-green-400');
                        setTimeout(() => handleAnswer(10), 1000); 
                    }
                }, 1000);
            }
        };

        const renderResult = async () => {
            const rank = getRank(state.score);
            
            renderHTML(`
                <div class="text-center space-y-6">
                    <h2 class="text-2xl font-bold">评估完成</h2>
                    <div class="py-6">
                        <p class="text-gray-400 mb-2">你的总抽象值</p>
                        <div class="text-6xl font-bold glitch-text mb-4">${state.score}</div>
                        <p class="text-gray-400 mb-2">你的宇宙阶级</p>
                        <div class="text-3xl font-bold ${rank.color} mb-2">${rank.title}</div>
                        <p class="text-sm text-gray-300 italic">"${rank.desc}"</p>
                    </div>
                    <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
                        <button id="viewLdbBtn" class="px-6 py-3 rounded-lg font-bold bg-gray-800 border border-gray-600 hover:bg-gray-700 transition">
                            <i class="fas fa-trophy text-yellow-500 mr-2"></i> 查看抽象排行榜
                        </button>
                        <button id="retryBtn" class="px-6 py-3 rounded-lg font-bold btn-abstract">
                            重新洗脑 (再测一次)
                        </button>
                    </div>
                </div>
            `);

            if (state.score > 0) {
                const scoreData = {
                    name: state.userName,
                    score: state.score,
                    rankTitle: rank.title,
                    timestamp: new Date().getTime()
                };
                try {
                    // 调用 Cloudflare Functions API 存储数据
                    await fetch('/api/scores', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(scoreData)
                    });
                    state.usingLocal = false;
                } catch (e) {
                    console.warn("API请求失败，降级为本地存储", e);
                    saveScoreLocal(scoreData);
                    state.usingLocal = true;
                }
            }

            document.getElementById('viewLdbBtn').addEventListener('click', () => {
                state.currentStep = 21;
                renderLeaderboard();
            });
            document.getElementById('retryBtn').addEventListener('click', () => {
                renderHome(); 
            });
        };

        const renderLeaderboard = async () => {
            renderHTML(`
                <div class="space-y-4">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-cyan-400"><i class="fas fa-satellite-dish mr-2"></i> 宇宙抽象波频记录板</h2>
                        <button id="backBtn" class="text-gray-400 hover:text-white transition"><i class="fas fa-arrow-left"></i> 返回</button>
                    </div>
                    <div id="ldb-content" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2">
                        <div class="text-center text-gray-500 py-10"><i class="fas fa-spinner fa-spin mr-2"></i> 正在同步平行宇宙数据...</div>
                    </div>
                </div>
            `);

            document.getElementById('backBtn').addEventListener('click', renderResult);

            try {
                // 请求 Cloudflare API 获取最新榜单
                const response = await fetch('/api/scores');
                if (!response.ok) throw new Error('网络维度断开连接');
                
                let data = await response.json();
                
                // 如果云端还没数据，提供一点默认数据避免太干瘪
                if (data.length === 0) {
                    data = getLocalScores(); 
                }
                
                renderLeaderboardList(data);
            } catch (error) {
                console.warn("无法连接到抽象排行榜服务器，显示本地幻觉...", error);
                let data = getLocalScores();
                data.sort((a, b) => b.score - a.score);
                renderLeaderboardList(data);
            }
        };

        const alertCustom = (title, message) => {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4 backdrop-blur-sm';
            overlay.innerHTML = `
                <div class="glass-panel p-6 max-w-sm w-full text-center border-pink-500 transform transition-all scale-100">
                    <h3 class="text-xl font-bold text-pink-500 mb-2">${title}</h3>
                    <p class="text-gray-300 mb-6">${message}</p>
                    <button id="closeModalBtn" class="px-6 py-2 rounded btn-abstract w-full">知道了</button>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('closeModalBtn').addEventListener('click', () => {
                document.body.removeChild(overlay);
            });
        };

        const escapeHtml = (unsafe) => {
            return (unsafe||"").toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        };

        const initApp = async () => {
            console.log("Connected to the void as:", state.userId);
            renderHome();
        };

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
