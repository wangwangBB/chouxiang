<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全宇宙抽象等级评估系统 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'ZCOOL KuaiLe', 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 0, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 255, 255, 0.05), transparent 25%);
        }

        .glitch-text {
            text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan);
            animation: glitch 2s infinite alternate-reverse;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); }
            20% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); }
            40% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); }
            60% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); transform: translate(1px, 1px); }
            80% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); transform: translate(-1px, -1px); }
            100% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .btn-abstract {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-cyan));
            border: none;
            color: white;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .btn-abstract:hover {
            transform: scale(1.05) rotate(-1deg);
            box-shadow: 0 0 15px var(--neon-pink), 0 0 15px var(--neon-cyan);
        }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .option-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: var(--neon-cyan);
            transform: translateX(5px);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: #000;
            border: 2px solid var(--neon-pink);
            border-radius: 0.5rem;
            overflow: hidden;
            touch-action: none;
        }

        input[type=range].chaos-slider {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range].chaos-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 30px;
            width: 30px;
            border-radius: 50%;
            background: var(--neon-pink);
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 10px var(--neon-pink);
        }
        input[type=range].chaos-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 10px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl glass-panel p-6 sm:p-8 relative">
        <div class="text-center py-10">
            <i class="fas fa-spinner fa-spin text-4xl text-pink-500"></i>
            <p class="mt-4 text-cyan-400">正在连接宇宙意识网络...</p>
        </div>
    </div>

    <script type="module">
        let state = {
            currentStep: -1,
            score: 0,
            userName: "",
            userId: "user_" + Math.random().toString(36).substr(2, 9),
            usingLocal: false,
            gameRetries: 3
        };

        // 全局游戏管理器：确保重试时清除残留事件和定时器
        let gameIntervals = [];
        let gameTimeouts = [];
        let gameListeners = [];

        const cleanupGame = () => {
            gameIntervals.forEach(clearInterval); gameIntervals = [];
            gameTimeouts.forEach(clearTimeout); gameTimeouts = [];
            gameListeners.forEach(l => l.target.removeEventListener(l.type, l.fn, l.options)); gameListeners = [];
        };

        const setGameInterval = (fn, t) => { const id = setInterval(fn, t); gameIntervals.push(id); return id; };
        const setGameTimeout = (fn, t) => { const id = setTimeout(fn, t); gameTimeouts.push(id); return id; };
        const addGameListener = (target, type, fn, options) => { target.addEventListener(type, fn, options); gameListeners.push({target, type, fn, options}); };

        const failMessages = [
            "你的大脑还不够抽象，请再试一次",
            "检测到正常人思维，正在清除...",
            "抽象能量不足，请充值",
            "建议重新投胎做一只卡皮巴拉",
            "你的逻辑太严密了，这很危险",
            "碳基生物的局限性暴露无遗"
        ];
        const passEmojis = ['🤡', '👽', '🧠', '🧻', '🌀', '👁️', '🗿', '🐒', '💩', '✨', '🔥'];

        const triggerPass = (score) => {
            cleanupGame();
            handleAnswer(score); // 结算分数直接进入下一题
        };

        const triggerFail = (gameId) => {
            cleanupGame();
            state.gameRetries--;
            
            if (state.gameRetries <= 0) {
                // 彻底失败，弹出正常人警告
                const overlay = document.createElement('div');
                overlay.className = 'fixed inset-0 bg-black/90 flex items-center justify-center z-[120] p-4 backdrop-blur-sm';
                overlay.innerHTML = `
                    <div class="glass-panel p-6 max-w-sm w-full text-center border-red-500 scale-0 transition-transform duration-300" id="failModal">
                        <h3 class="text-2xl font-bold text-red-500 mb-4"><i class="fas fa-exclamation-triangle"></i> 警告</h3>
                        <p class="text-gray-300 mb-6 text-lg">你是纯纯正常人，确定要继续吗？</p>
                        <button id="skipGameBtn" class="px-6 py-3 rounded btn-abstract w-full bg-red-600 hover:bg-red-700 shadow-[0_0_15px_rgba(220,38,38,0.5)]">确定 (扣10分跳过)</button>
                    </div>
                `;
                document.body.appendChild(overlay);
                setTimeout(() => document.getElementById('failModal').classList.replace('scale-0', 'scale-100'), 10);
                document.getElementById('skipGameBtn').onclick = () => {
                    overlay.remove();
                    handleAnswer(-10); // 扣分并强制下一题
                };
            } else {
                // 嘲讽弹窗重试
                const msg = failMessages[Math.floor(Math.random() * failMessages.length)];
                const overlay = document.createElement('div');
                overlay.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-[110] p-4 backdrop-blur-sm';
                overlay.innerHTML = `
                    <div class="glass-panel p-6 max-w-sm w-full text-center border-cyan-500 scale-0 transition-transform duration-300" id="failModal">
                        <h3 class="text-xl font-bold text-cyan-400 mb-4 glitch-text">系统判定</h3>
                        <p class="text-gray-300 mb-6 text-lg font-bold">${msg}</p>
                        <p class="text-sm text-pink-500 mb-4 font-mono">剩余重试次数: ${state.gameRetries} / 3</p>
                        <button id="retryGameBtn" class="px-6 py-2 rounded btn-abstract w-full">领悟抽象</button>
                    </div>
                `;
                document.body.appendChild(overlay);
                setTimeout(() => document.getElementById('failModal').classList.replace('scale-0', 'scale-100'), 10);
                document.getElementById('retryGameBtn').onclick = () => {
                    overlay.remove();
                    initGame(gameId); // 干干净净重启当前小游戏
                };
            }
        };

                let stillT = 0, done = false;
                setGameInterval(() => {
                    if(done) return; stillT += 0.1; bar.style.width = (stillT/3 * 100) + '%';
                    if(stillT >= 3) { done = true; bar.classList.replace('bg-cyan-500', 'bg-green-500'); triggerPass(15); }
                }, 100);
                
                const fail = () => {
                    if(done || stillT <= 0.5) return; // 给0.5秒缓冲时间防止手抖秒失败
                    done = true;
                    bar.classList.replace('bg-cyan-500', 'bg-red-500');
                    triggerFail('dont_do_anything');
                };
                
                addGameListener(window, 'mousemove', fail); 
                addGameListener(window, 'keydown', fail); 
                addGameListener(window, 'touchmove', fail);
            }

            else if (gameId === 'reverse_control') {
                container.innerHTML = `
                    <div id="mirror-arena" class="relative w-full h-64 bg-gray-900 rounded-lg overflow-hidden border-2 border-indigo-500 select-none touch-none cursor-crosshair shadow-[inset_0_0_30px_rgba(99,102,241,0.2)]">
                        <div id="mirror-goal" class="absolute w-12 h-12 border-4 border-dashed border-green-500 rounded-full animate-pulse z-10 -translate-x-1/2 -translate-y-1/2"></div>
                        <div id="mirror-player" class="absolute w-10 h-10 bg-pink-600 rounded shadow-[0_0_15px_#ff00ff] z-20 -translate-x-1/2 -translate-y-1/2" style="top: 50%; left: 50%;"></div>
                        <div id="mirror-timer" class="absolute bottom-2 right-2 text-indigo-400 font-mono text-sm font-bold">10.0s</div>
                    </div>
                `;
                const arena = document.getElementById('mirror-arena');
                const player = document.getElementById('mirror-player');
                const goal = document.getElementById('mirror-goal');
                const timerEl = document.getElementById('mirror-timer');

                // 强制刷新一下尺寸
                let rect = arena.getBoundingClientRect();
                let pX = rect.width / 2;
                let pY = rect.height / 2;
                
                // 随机生成目标位置（四个角落之一）
                const corners = [
                    {x: rect.width * 0.15, y: rect.height * 0.15},
                    {x: rect.width * 0.85, y: rect.height * 0.15},
                    {x: rect.width * 0.15, y: rect.height * 0.85},
                    {x: rect.width * 0.85, y: rect.height * 0.85}
                ];
                const gPos = corners[Math.floor(Math.random() * corners.length)];
                goal.style.left = gPos.x + 'px';
                goal.style.top = gPos.y + 'px';

                let isDragging = false;
                let lastX = 0, lastY = 0;
                let timeLeft = 10.0;
                let done = false;

                // 10秒生死倒计时
                setGameInterval(() => {
                    if(done) return;
                    timeLeft -= 0.1;
                    timerEl.innerText = Math.max(0, timeLeft).toFixed(1) + 's';
                    if(timeLeft <= 0) {
                        done = true;
                        triggerFail('reverse_control');
                    }
                }, 100);

                const start = (e) => {
                    if(done) return;
                    isDragging = true;
                    rect = arena.getBoundingClientRect(); // 保证坐标正确
                    const pt = e.touches ? e.touches[0] : e;
                    lastX = pt.clientX;
                    lastY = pt.clientY;
                };

                const move = (e) => {
                    if(!isDragging || done) return;
                    e.preventDefault(); 
                    const pt = e.touches ? e.touches[0] : e;
                    const dx = pt.clientX - lastX;
                    const dy = pt.clientY - lastY;
                    lastX = pt.clientX;
                    lastY = pt.clientY;

                    // 核心抽象逻辑：完全反向移动
                    pX -= dx;
                    pY -= dy;

                    // 边界限制
                    pX = Math.max(20, Math.min(rect.width - 20, pX));
                    pY = Math.max(20, Math.min(rect.height - 20, pY));

                    player.style.left = pX + 'px';
                    player.style.top = pY + 'px';

                    // 碰撞检测（容错半径35）
                    const dist = Math.hypot(pX - gPos.x, pY - gPos.y);
                    if(dist < 35) {
                        done = true;
                        player.style.backgroundColor = '#22c55e';
                        player.style.boxShadow = '0 0 20px #22c55e';
                        triggerPass(15);
                    }
                };

                const end = () => isDragging = false;

                arena.addEventListener('mousedown', start);
                arena.addEventListener('touchstart', start, {passive: false});
                addGameListener(window, 'mousemove', move);
                addGameListener(window, 'touchmove', move, {passive: false});
                addGameListener(window, 'mouseup', end);
                addGameListener(window, 'touchend', end);
            }
        };

        const handleAnswer = (scoreToAdd) => {
            state.score += scoreToAdd;
            state.currentStep++;
            renderTest();
        };

        const renderResult = async () => {
            cleanupGame(); // 清理所有的游戏遗留状态
            const rank = getRank(state.score);
            
            renderHTML(`
                <div class="text-center space-y-6">
                    <h2 class="text-2xl font-bold">评估完成</h2>
                    <div class="py-6">
                        <p class="text-gray-400 mb-2">你的总抽象值</p>
                        <div class="text-6xl font-bold glitch-text mb-4">${state.score}</div>
                        <p class="text-gray-400 mb-2">你的宇宙阶级</p>
                        <div class="text-3xl font-bold ${rank.color} mb-2">${rank.title}</div>
                        <p class="text-sm text-gray-300 italic">"${rank.desc}"</p>
                    </div>
                    <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
                        <button id="viewLdbBtn" class="px-6 py-3 rounded-lg font-bold bg-gray-800 border border-gray-600 hover:bg-gray-700 transition">
                            <i class="fas fa-trophy text-yellow-500 mr-2"></i> 查看抽象排行榜
                        </button>
                        <button id="retryBtn" class="px-6 py-3 rounded-lg font-bold btn-abstract">
                            重新洗脑 (再测一次)
                        </button>
                    </div>
                </div>
            `);

            if (state.score > 0) {
                const scoreData = { name: state.userName, score: state.score, rankTitle: rank.title, timestamp: new Date().getTime() };
                try {
                    await fetch('/api/scores', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(scoreData) });
                    state.usingLocal = false;
                } catch (e) {
                    console.warn("API请求失败，降级为本地存储", e);
                    saveScoreLocal(scoreData);
                    state.usingLocal = true;
                }
            }

            document.getElementById('viewLdbBtn').addEventListener('click', () => renderLeaderboard());
            document.getElementById('retryBtn').addEventListener('click', () => renderHome());
        };

        const renderLeaderboardList = (data) => {
            const contentDiv = document.getElementById('ldb-content');
            if (!contentDiv) return;
            
            if (data.length === 0) {
                contentDiv.innerHTML = '<div class="text-center text-gray-500 py-10">这里还是一片虚无...</div>'; return;
            }

            contentDiv.innerHTML = data.map((item, index) => {
                let medal = index === 0 ? '<i class="fas fa-crown text-yellow-400 ml-2"></i>' : (index === 1 ? '<i class="fas fa-medal text-gray-300 ml-2"></i>' : (index === 2 ? '<i class="fas fa-medal text-amber-600 ml-2"></i>' : ''));
                return `
                    <div class="flex justify-between items-center p-3 rounded-lg bg-gray-800/50 border border-gray-700 hover:border-cyan-500/50 transition">
                        <div class="flex items-center">
                            <span class="w-6 text-gray-500 font-mono text-sm">${index + 1}.</span>
                            <span class="font-bold ml-2 text-gray-200">${escapeHtml(item.name)}</span>${medal}
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-xs text-pink-400 hidden sm:inline">${item.rankTitle || ''}</span>
                            <span class="font-bold text-cyan-300 font-mono">${item.score} pt</span>
                        </div>
                    </div>
                `;
            }).join('');
        };

        const renderLeaderboard = async () => {
            renderHTML(`
                <div class="space-y-4">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-cyan-400"><i class="fas fa-satellite-dish mr-2"></i> 宇宙抽象波频记录板</h2>
                        <button id="backBtn" class="text-gray-400 hover:text-white transition"><i class="fas fa-arrow-left"></i> 返回</button>
                    </div>
                    <div id="ldb-content" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2">
                        <div class="text-center text-gray-500 py-10"><i class="fas fa-spinner fa-spin mr-2"></i> 正在同步平行宇宙数据...</div>
                    </div>
                </div>
            `);

            document.getElementById('backBtn').addEventListener('click', renderResult);

            try {
                const response = await fetch('/api/scores');
                if (!response.ok) throw new Error('网络维度断开连接');
                let data = await response.json();
                if (data.length === 0) data = getLocalScores(); 
                renderLeaderboardList(data);
            } catch (error) {
                console.warn("无法连接到抽象排行榜服务器，显示本地幻觉...", error);
                renderLeaderboardList(getLocalScores());
            }
        };

        const initApp = () => renderHome();
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
